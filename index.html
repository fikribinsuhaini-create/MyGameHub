<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PuzzleHub">
  <meta name="description" content="Premium offline-first puzzle companion for Sudoku, Kakuro, and Sumplete.">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <title>PuzzleHub</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Premium Puzzle Collection</p>
        <h1 id="page-title">PuzzleHub</h1>
      </div>
      <div class="topbar-actions">
        <button id="sync-button" class="ghost-button" type="button">Sync</button>
        <button id="install-button" class="accent-button hidden" type="button">Install</button>
      </div>
    </header>
    <main id="app-root" class="app-root"></main>
    <nav class="bottom-nav">
      <button class="nav-item active" data-route="home" type="button">Home</button>
      <button class="nav-item" data-route="games" type="button">Games</button>
      <button class="nav-item" data-route="progress" type="button">Progress</button>
      <button class="nav-item" data-route="profile" type="button">Profile</button>
      <button class="nav-item" data-route="settings" type="button">Settings</button>
    </nav>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
