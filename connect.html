<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>PuzzleHub Connect</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="stack">
      <section class="hero-panel">
        <div class="hero-copy">
          <p class="eyebrow">Private Device Connect</p>
          <h1 class="hero-title">Connect this device once.</h1>
          <p class="muted">Magic link only. No register page. No password form. After connected, PuzzleHub sync can run on this device.</p>
        </div>
      </section>
      <section class="panel connect-panel">
        <form id="connect-form" class="stack">
          <label class="muted">Supabase Email
            <input id="connect-email" type="email" placeholder="you@example.com" required>
          </label>
          <div class="action-row">
            <button class="accent-button" type="submit">Send Magic Link</button>
            <a class="ghost-button connect-link" href="./index.html">Back to App</a>
          </div>
        </form>
        <div id="connect-status" class="list-card hidden"></div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script src="./connect.js" type="module"></script>
</body>
</html>
